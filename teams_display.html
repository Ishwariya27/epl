<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Teams - EPL Predictor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://wallpapercave.com/wp/wp1830649.jpg') no-repeat center center/cover;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Slight dark overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
        }

        .header { 
            text-align: center; 
            color: white; 
            margin-bottom: 40px; 
            padding: 40px 20px;
        }

        .header h1 { 
            font-size: 2.5em; 
            margin-bottom: 10px; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .header p {
            font-size: 1.1em;
            color: #eaeaea;
        }

        .nav { text-align: center; margin-bottom: 30px; }

        .nav-btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 0 10px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }

        .filter-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .team-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .team-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 5px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin: 0 auto 15px;
            display: block;
        }

        .team-badge {
            width: 80px;
            height: 80px;
            background: var(--team-color, #666);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: white;
            font-weight: bold;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .team-name {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222;
        }

        .team-info {
            text-align: left;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .info-item {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .info-label {
            font-weight: bold;
            color: #555;
        }

        .info-value {
            color: #666;
        }

        .team-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat { text-align: center; }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
            text-transform: uppercase;
        }

        .loading, .no-results {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
            grid-column: 1 / -1;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .teams-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: center; }
            .search-box { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-users"></i> Premier League Teams</h1>
            <p>Explore all teams in the Premier League</p>
        </div>

        <div class="nav">
            <a href="{{ url_for('index') }}" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <a href="{{ url_for('epl_info') }}" class="nav-btn"><i class="fas fa-info-circle"></i> EPL Info</a>
            <a href="{{ url_for('detailed_ftr') }}" class="nav-btn"><i class="fas fa-chart-bar"></i> Detailed FTR</a>
            <a href="{{ url_for('simple_ftr') }}" class="nav-btn"><i class="fas fa-bolt"></i> Quick FTR</a>
            <a href="{{ url_for('score_prediction') }}" class="nav-btn"><i class="fas fa-crosshairs"></i> Score Predict</a>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="Search teams...">
            <button class="filter-btn" onclick="sortByName()">Sort by Name</button>
            <button class="filter-btn" onclick="sortByTrophies()">Sort by Trophies</button>
            <button class="filter-btn" onclick="sortByFounded()">Sort by Founded</button>
        </div>

        <div id="teamsContainer" class="teams-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading teams data from API...</p>
            </div>
        </div>
    </div>

    <script>
        let allTeams = [];

        async function loadTeams() {
            try {
                const response = await fetch('/api/football/teams');
                const data = await response.json();
                if (data.success) displayTeams(data.teams);
                else showError('Failed to load teams data');
            } catch (error) {
                console.error('Error loading teams:', error);
                showError('Error loading teams data');
            }
        }

        function displayTeams(teams) {
            const container = document.getElementById('teamsContainer');
            allTeams = teams;
            if (teams.length === 0) {
                container.innerHTML = '<div class="no-results">No teams found</div>';
                return;
            }
            container.innerHTML = teams.map(team => `
                <div class="team-card" style="--team-color: ${team.color}">
                    ${team.logo ? 
                        `<img src="${team.logo}" alt="${team.name}" class="team-logo">` : 
                        `<div class="team-badge">${team.name.charAt(0)}</div>`}
                    <div class="team-name">${team.name}</div>
                    <div class="team-info">
                        <div class="info-item"><span class="info-label">Stadium:</span><span class="info-value">${team.stadium} ${team.stadium_capacity ? `(${team.stadium_capacity.toLocaleString()} capacity)` : ''}</span></div>
                        <div class="info-item"><span class="info-label">Founded:</span><span class="info-value">${team.founded}</span></div>
                        <div class="info-item"><span class="info-label">City:</span><span class="info-value">${team.city || 'Unknown'}</span></div>
                        <div class="info-item"><span class="info-label">Country:</span><span class="info-value">${team.country}</span></div>
                    </div>
                    <div class="team-stats">
                        <div class="stat"><div class="stat-value">${team.founded}</div><div class="stat-label">Founded</div></div>
                        <div class="stat"><div class="stat-value">${team.stadium_capacity ? (team.stadium_capacity/1000).toFixed(1) + 'K' : 'N/A'}</div><div class="stat-label">Capacity</div></div>
                    </div>
                </div>
            `).join('');
        }

        function showError(message) {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-exclamation-triangle"></i><br>
                    ${message}<br>
                    <button onclick="loadTeams()" style="margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 20px; cursor: pointer;">
                        Try Again
                    </button>
                </div>`;
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredTeams = allTeams.filter(team => 
                team.name.toLowerCase().includes(searchTerm) ||
                team.stadium.toLowerCase().includes(searchTerm)
            );
            displayTeams(filteredTeams);
        });

        function sortByName() {
            const sorted = [...allTeams].sort((a, b) => a.name.localeCompare(b.name));
            displayTeams(sorted);
        }

        function sortByTrophies() {
            const sorted = [...allTeams].sort((a, b) => b.trophies - a.trophies);
            displayTeams(sorted);
        }

        function sortByFounded() {
            const sorted = [...allTeams].sort((a, b) => a.founded - b.founded);
            displayTeams(sorted);
        }

        loadTeams();
    </script>
</body>
</html>
