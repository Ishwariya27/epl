<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - EPL Predictor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("https://thumbs.dreamstime.com/b/soccer-stadium-ball-grass-lights-stands-sport-background-football-game-competition-poster-design-banner-371006857.jpg?w=992")
        no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .auth-container {
      position: relative;
      z-index: 1;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #fff;
      font-size: 2.2em;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(233,0,82,0.8);
    }

    .logo p {
      color: #ddd;
      font-size: 1rem;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #f1f1f1;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: rgba(255,255,255,0.15);
      color: white;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 10px rgba(233,0,82,0.6);
    }

    /* Fix for dropdown options */
    select.form-control option {
      background: #2a2a2a;
      color: white;
      padding: 10px;
    }

    /* Style the dropdown arrow */
    select.form-control {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 16px;
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #E90052, #360D77);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(233,0,82,0.5);
      background: linear-gradient(135deg, #360D77, #E90052);
    }

    .auth-links, .nav-links {
      text-align: center;
      margin-top: 20px;
    }

    .auth-links a, .nav-link {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .auth-links a:hover, .nav-link:hover {
      color: #E90052;
    }

    .flash-messages { margin-bottom: 20px; }

    .alert {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .alert-success {
      background: rgba(40,167,69,0.85);
      color: white;
    }

    .alert-error {
      background: rgba(220,53,69,0.85);
      color: white;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 25px;
      }
      .logo h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="logo">
      <h1><i class="fas fa-futbol"></i> EPL Predictor</h1>
      <p>Create your account</p>
    </div>

    <div class="flash-messages">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>

    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="favorite_team">Favorite Team (Optional)</label>
        <select id="favorite_team" name="favorite_team" class="form-control">
          <option value="">Select Favorite Team</option>
          {% for team in teams %}
          <option value="{{ team }}">{{ team }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="btn-primary">Register</button>
    </form>

    <div class="auth-links">
      <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>

    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-link">← Back to Home</a>
    </div>
  </div>
</body>
</html>
